<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style aria-label="Main">
        :root {
            --main-text-color: rgb(255, 255, 255);
            --font-size: 8px;
            --main-box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.3);

            --main-ui-color: rgba(0, 0, 0, 0.137);
            --header-color: rgba(32, 32, 32, 0.226);

            --ui-border-radius: 0px;

            --ui-back-drop: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'MainFont', monospace;
        }

        @font-face {
            font-family: 'MainFont';
            src: url(/Fonts/OverpassMono-Regular.ttf);

        }
        
        body {
            background-color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <div class="Logo">
        <div class="explosion-container"></div>
            <canvas id="explosionCanvas"></canvas>
            <h1 class="final-text">Eden Economy</h1>
        </div>

        <style>
            .Logo {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                position: relative;
            }
            
            .explosion-container {
                position: relative;
                width: 600px;
                height: 200px;
            }
            
            #explosionCanvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
            
            .final-text {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 48px;
                background: linear-gradient(135deg, #2c3e50, #27ae60);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: 4px;
                text-transform: uppercase;
                opacity: 0;
                animation: finalTextReveal 1s ease-out 3s forwards;
            }
            
            @keyframes finalTextReveal {
                0% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.8);
                }
                100% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
            }
        </style>

        <script aria-label="Logo_Script">
            class ParticleExplosion {
                constructor(canvas, text) {
                    this.canvas = canvas;
                    this.ctx = canvas.getContext('2d');
                    this.text = text;
                    this.particles = [];
                    this.animationComplete = false;
                    
                    this.resize();
                    this.createTextParticles();
                    this.explodeParticles();
                    this.animate();
                    
                    window.addEventListener('resize', () => this.resize());
                }
                
                resize() {
                    this.canvas.width = this.canvas.offsetWidth;
                    this.canvas.height = this.canvas.offsetHeight;
                }
                
                createTextParticles() {
                    // Create temporary canvas to render text
                    const tempCanvas = document.createElement('canvas');
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = this.canvas.width;
                    tempCanvas.height = this.canvas.height;
                    
                    // Draw text
                    tempCtx.font = 'bold 48px monospace';
                    tempCtx.fillStyle = '#27ae60';
                    tempCtx.textAlign = 'center';
                    tempCtx.textBaseline = 'middle';
                    tempCtx.fillText(this.text, tempCanvas.width / 2, tempCanvas.height / 2);
                    
                    // Get text pixels
                    const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                    const pixels = imageData.data;
                    
                    // Sample pixels and create particles
                    for (let y = 0; y < tempCanvas.height; y += 4) {
                        for (let x = 0; x < tempCanvas.width; x += 4) {
                            const index = (y * tempCanvas.width + x) * 4;
                            const alpha = pixels[index + 3];
                            
                            if (alpha > 128) {
                                this.particles.push({
                                    x: x,
                                    y: y,
                                    originX: x,
                                    originY: y,
                                    vx: 0,
                                    vy: 0,
                                    size: Math.random() * 3 + 1,
                                    color: `hsl(${150 + Math.random() * 30}, 70%, ${40 + Math.random() * 20}%)`,
                                    delay: Math.random() * 0.5
                                });
                            }
                        }
                    }
                }
                
                explodeParticles() {
                    this.particles.forEach(particle => {
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = Math.random() * 15 + 10;
                        
                        particle.x = particle.originX + Math.cos(angle) * velocity * 20;
                        particle.y = particle.originY + Math.sin(angle) * velocity * 20;
                        particle.vx = -Math.cos(angle) * velocity;
                        particle.vy = -Math.sin(angle) * velocity;
                    });
                }
                
                animate() {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    let allSettled = true;
                    
                    this.particles.forEach(particle => {
                        if (particle.delay > 0) {
                            particle.delay -= 0.016;
                            return;
                        }
                        
                        // Spring physics to return to origin
                        const dx = particle.originX - particle.x;
                        const dy = particle.originY - particle.y;
                        
                        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                            particle.vx += dx * 0.05;
                            particle.vy += dy * 0.05;
                            particle.vx *= 0.85; // Damping
                            particle.vy *= 0.85;
                            
                            particle.x += particle.vx;
                            particle.y += particle.vy;
                            allSettled = false;
                        } else {
                            particle.x = particle.originX;
                            particle.y = particle.originY;
                        }
                        
                        // Draw particle
                        this.ctx.fillStyle = particle.color;
                        this.ctx.beginPath();
                        this.ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                        this.ctx.fill();
                    });
                    
                    if (!allSettled && !this.animationComplete) {
                        requestAnimationFrame(() => this.animate());
                    } else {
                        this.animationComplete = true;
                        // Clear canvas after animation
                        setTimeout(() => {
                            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                        }, 500);
                    }
                }
            }
            
            // Initialize explosion when page loads
            window.addEventListener('load', () => {
                const canvas = document.getElementById('explosionCanvas');
                new ParticleExplosion(canvas, 'Eden Economy');
            });
        </script>
    </div>
</body>
</html>
