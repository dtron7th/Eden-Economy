<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style aria-label="Main">
        :root {
            --main-text-color: rgb(255, 255, 255);
            --font-size: 8px;
            --main-box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.3);

            --main-ui-color: rgba(0, 0, 0, 0.137);
            --header-color: rgba(32, 32, 32, 0.226);

            --ui-border-radius: 0px;

            --ui-back-drop: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'MainFont', monospace;
        }

        @font-face {
            font-family: 'MainFont';
            src: url(/Fonts/JetBrainsMono-2.304/fonts/variable/JetBrainsMono[wght].ttf);

        }
        
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background-color: rgb(255, 255, 255);
        }
        
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c8c8c8;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #9a9a9a;
        }
    </style>
</head>
<body>
    <div class="Logo">
        <canvas id="networkCanvas"></canvas>
        <div class="logo-container">
            <div class="text-container">
                <span class="letter" data-letter="E">E</span>
                <span class="letter" data-letter="d">d</span>
                <span class="letter" data-letter="e">e</span>
                <span class="letter" data-letter="n">n</span>
                <span class="space"></span>
                <span class="letter" data-letter="E">E</span>
                <span class="letter" data-letter="c">c</span>
                <span class="letter" data-letter="o">o</span>
                <span class="letter" data-letter="n">n</span>
                <span class="letter" data-letter="o">o</span>
                <span class="letter" data-letter="m">m</span>
                <span class="letter" data-letter="y">y</span>
            </div>
        </div>

        <style>
            .Logo {
                width: 100dvw;
                height: 100dvh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: rgb(255, 255, 255);
                overflow: hidden;
                position: relative;
                scroll-snap-align: start;
            }
            
            #networkCanvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
            }
            
            .logo-container {
                position: relative;
                text-align: center;
                z-index: 1;
            }
            
            .text-container {
                position: relative;
                display: inline-block;
            }
            
            .letter {
                display: inline-block;
                font-size: 24px;
                font-weight: 100;
                color: transparent;
                background: linear-gradient(135deg, #9a9a9a, #c8c8c8, #888888, #c8c8c8);
                background-size: 300% 300%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                opacity: 0;
                transform: translateY(10px);
                animation: letterFadeIn 1.2s ease-out forwards, gradientShift 3s ease-in-out infinite 2s;
                position: relative;
            }
            
            .letter::before {
                content: attr(data-letter);
                position: absolute;
                top: 0;
                left: 0;
                color: transparent;
                background: linear-gradient(135deg, #888888, #c8c8c8, #9a9a9a, #c8c8c8);
                background-size: 300% 300%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: gradientShift 3s ease-in-out infinite 2s reverse;
                z-index: -1;
                opacity: 0.5;
                filter: blur(2px);
                transform: translate(2px, 2px);
            }
            
            .space {
                display: inline-block;
                width: 20px;
            }
            
            @keyframes letterFadeIn {
                0% {
                    opacity: 0;
                    transform: translateY(10px);
                }
                20% {
                    opacity: 0.3;
                    transform: translateY(8px);
                }
                50% {
                    opacity: 0.7;
                    transform: translateY(4px);
                }
                80% {
                    opacity: 0.95;
                    transform: translateY(1px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            @keyframes gradientShift {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
        </style>

        <script aria-label="Scroll_Script">
            // Enhanced smooth scrolling with easing
            document.addEventListener('DOMContentLoaded', () => {
                // Disable default scroll-behavior for custom implementation
                document.documentElement.style.scrollBehavior = 'auto';
                document.body.style.scrollBehavior = 'auto';
                
                // Custom smooth scroll function
                function smoothScrollTo(target, duration = 800) {
                    const start = window.pageYOffset;
                    const distance = target - start;
                    let startTime = null;
                    
                    function easeInOutCubic(t) {
                        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                    }
                    
                    function animateScroll(currentTime) {
                        if (startTime === null) startTime = currentTime;
                        const timeElapsed = currentTime - startTime;
                        const progress = Math.min(timeElapsed / duration, 1);
                        const easeProgress = easeInOutCubic(progress);
                        
                        window.scrollTo(0, start + (distance * easeProgress));
                        
                        if (timeElapsed < duration) {
                            requestAnimationFrame(animateScroll);
                        } else {
                            // Ensure final position is exact
                            window.scrollTo(0, target);
                        }
                    }
                    
                    requestAnimationFrame(animateScroll);
                }
                
                // Handle scroll snap with smooth animation
                let isScrolling = false;
                let scrollTimeout;
                
                window.addEventListener('wheel', (e) => {
                    if (isScrolling) return;
                    
                    e.preventDefault();
                    isScrolling = true;
                    
                    const sections = document.querySelectorAll('.Logo, .Page_1, .page_2, .page_3');
                    const currentScroll = window.pageYOffset;
                    const viewportHeight = window.innerHeight;
                    
                    let currentSectionIndex = 0;
                    for (let i = 0; i < sections.length; i++) {
                        const sectionTop = sections[i].offsetTop;
                        if (Math.abs(currentScroll - sectionTop) < viewportHeight / 2) {
                            currentSectionIndex = i;
                            break;
                        }
                    }
                    
                    let targetSectionIndex;
                    if (e.deltaY > 0) {
                        // Scrolling down
                        targetSectionIndex = Math.min(currentSectionIndex + 1, sections.length - 1);
                    } else {
                        // Scrolling up
                        targetSectionIndex = Math.max(currentSectionIndex - 1, 0);
                    }
                    
                    const targetPosition = sections[targetSectionIndex].offsetTop;
                    smoothScrollTo(targetPosition);
                    
                    clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(() => {
                        isScrolling = false;
                    }, 850);
                }, { passive: false });
                
                // Handle keyboard navigation
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'PageDown' || e.key === 'PageUp') {
                        e.preventDefault();
                        
                        const sections = document.querySelectorAll('.Logo, .Page_1, .page_2, .page_3');
                        const currentScroll = window.pageYOffset;
                        const viewportHeight = window.innerHeight;
                        
                        let currentSectionIndex = 0;
                        for (let i = 0; i < sections.length; i++) {
                            const sectionTop = sections[i].offsetTop;
                            if (Math.abs(currentScroll - sectionTop) < viewportHeight / 2) {
                                currentSectionIndex = i;
                                break;
                            }
                        }
                        
                        let targetSectionIndex;
                        if (e.key === 'ArrowDown' || e.key === 'PageDown') {
                            targetSectionIndex = Math.min(currentSectionIndex + 1, sections.length - 1);
                        } else {
                            targetSectionIndex = Math.max(currentSectionIndex - 1, 0);
                        }
                        
                        const targetPosition = sections[targetSectionIndex].offsetTop;
                        smoothScrollTo(targetPosition);
                    }
                });
            });
        </script>
        <script aria-label="Logo_Script">
            document.addEventListener('DOMContentLoaded', () => {
                // Network particle system
                const canvas = document.getElementById('networkCanvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                const particles = [];
                const particleCount = 25;
                const connectionDistance = 500;
                
                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.vx = (Math.random() - 0.5) * 1.5;
                        this.vy = (Math.random() - 0.5) * 1.5;
                        this.radius = 2;
                        this.opacity = 0;
                        this.targetOpacity = 1;
                        this.lifespan = Math.random() * 4000 + 2000; // 2-6 seconds
                        this.age = 0;
                        this.isAlive = true;
                        this.fadeDuration = Math.random() * 800 + 400; // Random fade 400-1200ms
                        this.nextSpawnDelay = Math.random() * 2000 + 500; // Random delay 500-2500ms
                    }
                    
                    update(deltaTime) {
                        this.age += deltaTime;
                        
                        // Random fade in timing
                        if (this.age < this.fadeDuration) {
                            this.opacity = this.age / this.fadeDuration;
                        }
                        // Random fade out timing
                        else if (this.age > this.lifespan - this.fadeDuration) {
                            this.opacity = (this.lifespan - this.age) / this.fadeDuration;
                        }
                        // Stay fully visible
                        else {
                            this.opacity = 1;
                        }
                        
                        // Mark for removal when lifespan ends
                        if (this.age >= this.lifespan) {
                            this.isAlive = false;
                        }
                        
                        this.x += this.vx;
                        this.y += this.vy;
                        
                        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
                        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
                    }
                    
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(154, 154, 154, ${this.opacity * 0.5})`;
                        ctx.fill();
                    }
                }
                
                // Create particles
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
                
                let lastTime = 0;
                let spawnTimer = 0;
                
                function animate(currentTime) {
                    const deltaTime = currentTime - lastTime;
                    lastTime = currentTime;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Update and draw particles, remove dead ones and spawn replacements
                    for (let i = particles.length - 1; i >= 0; i--) {
                        particles[i].update(deltaTime);
                        particles[i].draw();
                        
                        if (!particles[i].isAlive) {
                            particles.splice(i, 1);
                            // Immediately spawn a new particle to replace the dead one
                            setTimeout(() => {
                                if (particles.length < particleCount) {
                                    particles.push(new Particle());
                                }
                            }, Math.random() * 2000 + 500); // Random delay 500-2500ms
                        }
                    }
                    
                    // Draw connections with opacity
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            
                            if (distance < connectionDistance) {
                                const avgOpacity = (particles[i].opacity + particles[j].opacity) / 2;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(154, 154, 154, ${0.2 * (1 - distance / connectionDistance) * avgOpacity})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }
                    
                    requestAnimationFrame(animate);
                }
                
                animate();
                
                // Handle resize
                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                });
                
                // Letter animations
                const letters = document.querySelectorAll('.letter');
                
                // Stagger letter animations
                letters.forEach((letter, index) => {
                    letter.style.animationDelay = `${index * 0.1}s`;
                    
                    // Add hover effect
                    letter.addEventListener('mouseenter', () => {
                        letter.style.transform = 'translateY(-5px) scale(1.1)';
                        letter.style.transition = 'transform 0.3s ease';
                    });
                    
                    letter.addEventListener('mouseleave', () => {
                        letter.style.transform = 'translateY(0) scale(1)';
                    });
                });
            });
        </script>
    </div>
