<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style aria-label="Main">
        :root {
            --main-text-color: rgb(255, 255, 255);
            --font-size: 8px;
            --main-box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.3);

            --main-ui-color: rgba(0, 0, 0, 0.137);
            --header-color: rgba(32, 32, 32, 0.226);

            --ui-border-radius: 0px;

            --ui-back-drop: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'MainFont', monospace;
        }

        @font-face {
            font-family: 'MainFont';
            src: url(/Fonts/OverpassMono-Regular.ttf);

        }
        
        body {
            background-color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <div class="Logo">
        <div class="logo-container">
            <div class="text-container">
                <span class="letter" data-letter="E">E</span>
                <span class="letter" data-letter="d">d</span>
                <span class="letter" data-letter="e">e</span>
                <span class="letter" data-letter="n">n</span>
                <span class="space"></span>
                <span class="letter" data-letter="E">E</span>
                <span class="letter" data-letter="c">c</span>
                <span class="letter" data-letter="o">o</span>
                <span class="letter" data-letter="n">n</span>
                <span class="letter" data-letter="o">o</span>
                <span class="letter" data-letter="m">m</span>
                <span class="letter" data-letter="y">y</span>
            </div>
            <div class="underline"></div>
        </div>

        <style>
            .Logo {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: rgb(255, 255, 255);
                overflow: hidden;
            }
            
            .logo-container {
                position: relative;
                text-align: center;
            }
            
            .text-container {
                position: relative;
                display: inline-block;
            }
            
            .letter {
                display: inline-block;
                font-size: 24px;
                font-weight: 700;
                color: transparent;
                background: linear-gradient(135deg, #667eea, #764ba2, #667eea);
                background-size: 200% 200%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                opacity: 0;
                transform: translateY(20px);
                animation: letterFadeIn 1s ease-out forwards, gradientShift 3s ease-in-out infinite 2s;
                text-shadow: 0 0 20px rgba(102,126,234,0.3);
                position: relative;
            }
            
            .letter::before {
                content: attr(data-letter);
                position: absolute;
                top: 0;
                left: 0;
                color: transparent;
                background: linear-gradient(135deg, #764ba2, #667eea, #764ba2);
                background-size: 200% 200%;
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                animation: gradientShift 3s ease-in-out infinite 2s reverse;
                z-index: -1;
                opacity: 0.5;
                filter: blur(2px);
                transform: translate(2px, 2px);
            }
            
            .space {
                display: inline-block;
                width: 20px;
            }
            
            .underline {
                position: absolute;
                bottom: -20px;
                left: 50%;
                transform: translateX(-50%);
                width: 0;
                height: 3px;
                background: linear-gradient(90deg, transparent, #667eea, transparent);
                animation: underlineGrow 1s ease-out 2s forwards;
            }
            
            @keyframes letterFadeIn {
                0% {
                    opacity: 0;
                    transform: translateY(20px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            @keyframes gradientShift {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
            
            @keyframes underlineGrow {
                0% { width: 0; opacity: 0; }
                50% { opacity: 1; }
                100% { width: 100%; opacity: 1; }
            }
        </style>

        <script aria-label="Logo_Script">
            document.addEventListener('DOMContentLoaded', () => {
                const letters = document.querySelectorAll('.letter');
                
                // Stagger letter animations
                letters.forEach((letter, index) => {
                    letter.style.animationDelay = `${index * 0.1}s`;
                    
                    // Add hover effect
                    letter.addEventListener('mouseenter', () => {
                        letter.style.transform = 'translateY(-5px) scale(1.1)';
                        letter.style.transition = 'transform 0.3s ease';
                    });
                    
                    letter.addEventListener('mouseleave', () => {
                        letter.style.transform = 'translateY(0) scale(1)';
                    });
                });
            });
        </script>
    </div>
</body>
</html>
